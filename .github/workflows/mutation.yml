name: Mutation Testing

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC nightly
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cli:
    name: CLI (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25" # gremlins v0.6+ requires go 1.25 to install
          cache-dependency-path: cli/go.sum

      - name: Install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@latest

      # Run per package — gremlins does not support ./... across a module.
      # .gremlins.yaml (timeout-coefficient: 20) is picked up automatically.
      # -S l shows only survivors; exit 0 always (informational, no threshold).
      - name: Mutate — internal/config
        run: gremlins unleash -S l --invert-assignments ./internal/config

      - name: Mutate — internal/git
        run: gremlins unleash -S l --invert-assignments ./internal/git

      - name: Mutate — internal/github
        run: gremlins unleash -S l --invert-assignments ./internal/github

      - name: Mutate — internal/parser
        run: gremlins unleash -S l --invert-assignments ./internal/parser

      - name: Mutate — internal/quarantine
        run: gremlins unleash -S l --invert-assignments ./internal/quarantine

      - name: Mutate — cmd/quarantine
        run: gremlins unleash -S l --invert-assignments ./cmd/quarantine
