name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: go-version
        run: echo "version=$(grep golang .tool-versions | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.go-version.outputs.version }}
          cache-dependency-path: go.sum

      - name: Verify CHANGELOG entry
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION_NUM="${VERSION#v}"
          if ! grep -q "^## \[${VERSION_NUM}\]" CHANGELOG.md; then
            echo "Error: CHANGELOG.md has no entry for [${VERSION_NUM}]"
            exit 1
          fi

      - name: Extract release notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION_NUM="${VERSION#v}"
          awk "/^## \[${VERSION_NUM}\]/{found=1; next} found && /^## \[/{exit} found && /^\[.*\]: /{exit} found{print}" CHANGELOG.md \
            > /tmp/release-notes.md

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean --release-notes /tmp/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
